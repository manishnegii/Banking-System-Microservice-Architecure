spring:
  application:
    name: transaction-service
  datasource:
    url: jdbc:postgresql://localhost:5432/transcation_service
    username: postgres
    password: MY_PASSWORD
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: true
  hibernate:
    ddl-auto: none
  properties:
    hibernate:
      dialect: org.hibernate.dialect.PostgreSqlDialect
  flyway:
    enabled: true
    location: classpath:db/migration
port: 8083
eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka